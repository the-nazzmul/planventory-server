components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token

  parameters:
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Opaque pagination cursor
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: string
    ProductId:
      name: id
      in: path
      required: true
      schema:
        type: string
    VariantId:
      name: variantId
      in: path
      required: true
      schema:
        type: string
    OrderId:
