openapi: 3.1.0
info:
  title: Planventory Inventory API
  version: 1.0.0
  license:
    name: Proprietary
    identifier: LicenseRef-Planventory-Proprietary
  description: |
    Inventory management API. All monetary amounts are integers in the smallest currency unit.
    Successful and error responses use a common envelope with `success`, optional `data`, optional `error`, and optional `meta`.
servers:
  - url: /
    description: API base (prepend your host)

security:
  - bearerAuth: []

tags:
  - name: Health
    description: Service health
  - name: Auth
    description: Authentication and session
  - name: Users
    description: User accounts (SUPER_ADMIN)
  - name: Categories
    description: Product categories
  - name: Brands
    description: Product brands
  - name: Products
    description: Products and variants
  - name: StockMovements
    description: Inventory movement history
  - name: Suppliers
    description: Suppliers
  - name: PurchaseOrders
    description: Purchase orders
  - name: Orders
    description: Customer orders
  - name: Returns
    description: Order returns
  - name: Expenses
    description: Operating expenses
  - name: Finance
    description: Financial summaries and reports
  - name: Settings
    description: Application settings
  - name: Webhooks
    description: Outbound webhooks

paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: Liveness / readiness probe
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Sign in with email and password
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated; sets refresh token cookie when applicable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate access token using httpOnly refresh cookie
      operationId: refreshToken
      security: []
      description: Uses the refresh token sent in an httpOnly cookie; no JSON body.
      responses:
        "200":
          description: New access token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate session and clear cookies
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/change-password:
    patch:
      tags: [Auth]
      summary: Change password for the authenticated user
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptySuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

